<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#grad-bg)"/>

  <!-- Safe zone -->
  <rect x="64" y="64" width="384" height="384" rx="96" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="4"/>

  <!-- Inventory stacks (3 boxes with better proportions) -->
  <g transform="translate(100, 120)" filter="url(#shadow)">
    <!-- Box 1 (top-left) -->
    <rect x="0" y="0" width="90" height="72" rx="8" fill="rgba(255,255,255,0.98)" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
    <rect x="6" y="8" width="78" height="12" fill="rgba(37, 99, 235, 0.15)"/>
    <line x1="6" y1="32" x2="84" y2="32" stroke="rgba(37, 99, 235, 0.08)" stroke-width="2"/>

    <!-- Box 2 (top-right) -->
    <rect x="110" y="20" width="90" height="72" rx="8" fill="rgba(255,255,255,0.94)" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
    <rect x="116" y="28" width="78" height="12" fill="rgba(37, 99, 235, 0.15)"/>
    <line x1="116" y1="52" x2="194" y2="52" stroke="rgba(37, 99, 235, 0.08)" stroke-width="2"/>

    <!-- Box 3 (bottom center, stacked) -->
    <rect x="55" y="110" width="90" height="72" rx="8" fill="rgba(255,255,255,0.90)" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
    <rect x="61" y="118" width="78" height="12" fill="rgba(37, 99, 235, 0.15)"/>
    <line x1="61" y1="142" x2="139" y2="142" stroke="rgba(37, 99, 235, 0.08)" stroke-width="2"/>
  </g>

  <!-- Checkmark badge (bottom-right) -->
  <g transform="translate(340, 340)">
    <circle cx="0" cy="0" r="64" fill="#10B981"/>
    <circle cx="0" cy="0" r="60" fill="#22C55E"/>
    <path d="M-24 0 L-6 20 L24 -12" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Decorative elements (subtle) -->
  <g opacity="0.1" stroke="white" stroke-width="2" fill="none">
    <circle cx="100" cy="100" r="30"/>
    <line x1="70" y1="80" x2="130" y2="120"/>
  </g>
</svg>
